<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Item</title>

  <link rel="stylesheet" href="../css/style.css?v=30">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="brand-header">
  <h1>Post Your Item</h1>
</div>

<div class="drop-container">

  <form onsubmit="event.preventDefault(); addProduct();">


    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Books">Books</option>
      <option value="Electronics">Electronics</option>
      <option value="Stationery">Stationery</option>
      <option value="Others">Others</option>
    </select>

    
    <input type="text" id="itemName" placeholder="Item Name" required>

    
    <textarea id="description" placeholder="About the item"></textarea>

   
    <select id="age">
      <option value="">How old is the item?</option>
      <option value="Less than 1 month">Less than 1 month</option>
      <option value="1-3 months">1–3 months</option>
      <option value="3-6 months">3–6 months</option>
      <option value="6-12 months">6–12 months</option>
      <option value="1+ year">1+ year</option>
    </select>

    
    <input type="number" id="price" placeholder="Price (₹)" required>

    
    <select id="condition">
      <option value="New">New</option>
      <option value="Like New">Like New</option>
      <option value="Used">Used</option>
    </select>

   
    <div class="image-upload">

      
      <label class="main-img-box">
        +
        <input type="file" accept="image/*" capture="environment" onchange="handleImage(this, 0)">
      </label>

     
      <div class="side-images">

        <label class="small-img-box">
          +
          <input type="file" accept="image/*" capture="environment" onchange="handleImage(this, 1)">
        </label>

        <label class="small-img-box">
          +
          <input type="file" accept="image/*" capture="environment" onchange="handleImage(this, 2)">
        </label>

      </div>

    </div>

    <button type="submit">Post Item</button>

  </form>

</div>

<script src="../js/drop.js"></script>

</body>
</html>
