<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAU Community Marketplace</title>

  <link rel="stylesheet" href="css/style.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body class="login-page">

<!-- ===== TOP BRANDING ===== -->
<div class="brand-header">
  <h1>SAU COMMUNITY MARKETPLACE</h1>
  <p>A Peer-To-Peer Marketplace For SAU Students</p>
</div>

<!-- ===== LOGIN SECTION ===== -->
<div class="login-container">

  <div class="login-box">

    <h2 id="formTitle">Welcome Back</h2>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form active">
      <input type="text" placeholder="Mobile No / Email" id="loginUser">
      <input type="password" placeholder="Password" id="loginPass">

      <button onclick="login()">Login</button>

      <p class="links">
        <span onclick="showForgot()">Forgot Password?</span>
        <span onclick="showRegister()">Register Now</span>
      </p>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="form">
      <input type="text" placeholder="Full Name" id="regName">
      <input type="text" placeholder="Mobile No" id="regMobile">
      <input type="password" placeholder="Set Password" id="regPass">

      <button onclick="register()">Register</button>

      <p class="links">
        <span onclick="showLogin()">Back to Login</span>
      </p>
    </div>

    <!-- FORGOT -->
    <div id="forgotForm" class="form">
      <input type="text" placeholder="Enter Mobile No" id="forgotMobile">

      <button onclick="sendOTP()">Send OTP</button>

      <p class="links">
        <span onclick="showLogin()">Back to Login</span>
      </p>
    </div>

    <!-- RESET -->
    <div id="resetForm" class="form">
      <input type="text" placeholder="Enter OTP">
      <input type="password" placeholder="New Password" id="newPass">

      <button onclick="resetPassword()">Reset Password</button>
    </div>

  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
